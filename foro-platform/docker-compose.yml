services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: foro
      POSTGRES_USER: foro
      POSTGRES_PASSWORD: foro_dev_only
    ports:
      - "5432:5432"
    volumes:
      - foro_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U foro -d foro"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [foro_internal]

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      FORO_DB_URL: jdbc:postgresql://postgres:5432/foro
      FORO_DB_USER: foro
      FORO_DB_PASSWORD: foro_dev_only
      FORO_JWT_SECRET: local-development-secret-change-before-production-123456
    depends_on:
      postgres:
        condition: service_healthy
    expose: ["8080"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [foro_internal]

  nginx:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8080:80"
    depends_on:
      backend:
        condition: service_healthy
    networks: [foro_internal]

volumes:
  foro_postgres:

networks:
  foro_internal:
    driver: bridge
